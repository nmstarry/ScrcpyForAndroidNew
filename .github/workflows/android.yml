name: Android Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - "*"
permissions:
  contents: write

jobs:
  ci-build:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    env:
      RELEASE_STORE_FILE: /tmp/release.p12
      RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
      RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            !~/.gradle/caches/build-cache-*
          key: gradle-deps-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-deps-

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches/build-cache-*
          key: gradle-builds-${{ github.sha }}
          restore-keys: gradle-builds-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode signing keystore
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$RELEASE_STORE_FILE"

      - name: Build signed release APKs
        run: ./gradlew clean assembleRelease

      - name: Collect CI APKs
        run: |
          set -euxo pipefail
          mkdir -p out

          find app/build/outputs/apk -type f -name "*.apk" | sort > out/apk-list.txt
          cat out/apk-list.txt

          if [ ! -s out/apk-list.txt ]; then
            echo "No APK files were generated under app/build/outputs/apk"
            exit 1
          fi

          while IFS= read -r apk; do
            base_name="$(basename "$apk")"
            cp "$apk" "out/ci-${base_name}"
          done < out/apk-list.txt

          rm -f out/apk-list.txt

          ls -la out

      - name: Upload CI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-ci-apks-${{ github.run_number }}
          path: out/*.apk
          if-no-files-found: error

  release-build:
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    env:
      RELEASE_STORE_FILE: /tmp/release.p12
      RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
      RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            !~/.gradle/caches/build-cache-*
          key: gradle-deps-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-deps-

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches/build-cache-*
          key: gradle-builds-${{ github.sha }}
          restore-keys: gradle-builds-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode signing keystore
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$RELEASE_STORE_FILE"

      - name: Build signed release APKs
        run: ./gradlew clean assembleRelease

      - name: Collect release assets
        run: |
          set -euxo pipefail
          TAG="${GITHUB_REF_NAME}"
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          mkdir -p dist

          find app/build/outputs/apk -type f -name "*.apk" | sort > dist/apk-list.txt
          cat dist/apk-list.txt

          if [ ! -s dist/apk-list.txt ]; then
            echo "No APK files were generated under app/build/outputs/apk"
            exit 1
          fi

          while IFS= read -r apk; do
            base_name="$(basename "$apk")"
            cp "$apk" "dist/${REPO_NAME}-${TAG}-${base_name}"
          done < dist/apk-list.txt

          rm -f dist/apk-list.txt

          ls -la dist

      - name: Generate release notes
        run: |
          set -euo pipefail

          notes_file="dist/RELEASE_NOTES.md"
          download_base_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}"

          {
            echo "建议优先下载具有稳定签名的 **release** 构建"
            echo
            echo "| 架构 | 构建类型 | 文件 | SHA256 | 大小 |"
            echo "| --- | --- | --- | --- | --- |"

            shopt -s nullglob
            for apk in dist/*.apk; do
              file_name="$(basename "$apk")"

              arch="unknown"
              if [[ "$file_name" == *"arm64-v8a"* ]] || [[ "$file_name" == *"arm64"* ]]; then
                arch="arm64"
              elif [[ "$file_name" == *"armeabi-v7a"* ]] || [[ "$file_name" == *"arm32"* ]]; then
                arch="arm32"
              elif [[ "$file_name" == *"x86_64"* ]]; then
                arch="x86_64"
              elif [[ "$file_name" == *"x86"* ]]; then
                arch="x86_32"
              elif [[ "$file_name" == *"universal"* ]] || [[ "$file_name" == *"arm_all"* ]]; then
                arch="arm_all"
              fi

              build_type="release"

              file_url="${download_base_url}/${file_name}"
              sha256_value="$(sha256sum "$apk" | awk '{print $1}')"
              size_bytes="$(stat -c%s "$apk")"
              size_mb="$(awk -v bytes="$size_bytes" 'BEGIN { printf "%.1f MB", bytes / 1048576 }')"

              echo "| ${arch} | ${build_type} | [${file_name}](${file_url}) | ${sha256_value} | ${size_mb} |"
            done
          } > "$notes_file"

          cat "$notes_file"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: dist/RELEASE_NOTES.md
          files: dist/*.apk
